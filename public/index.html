<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<script>
  // Aplica o tema salvo antes de renderizar a página (evita flash)
  const _t = localStorage.getItem('sc_tema');
  if (_t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Sorriso Calories</title>
<link rel="stylesheet" href="css/shared.css">
<style>
  /* Grade dos 4 cards de estatísticas no topo */
  .dg { display:grid; grid-template-columns:repeat(4,1fr); gap:20px; margin-bottom:28px }

  /* Card de estatística individual */
  .sc  { background:var(--white); border-radius:var(--r); box-shadow:var(--sh);
         padding:24px 28px; display:flex; flex-direction:column; gap:12px }
  /* Variante escura (card de calorias) */
  .sc.acc { background:var(--g700) }
  .sc.acc .sl,.sc.acc .ss { color:rgba(255,255,255,.75) !important }
  .sc.acc .sv { color:var(--white) !important }

  .st  { display:flex; align-items:center; justify-content:space-between }
  .sl  { font-size:11px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--gray400) }
  .si  { width:36px; height:36px; border-radius:var(--rs); background:var(--g50);
         display:flex; align-items:center; justify-content:center }
  .sc.acc .si { background:rgba(255,255,255,.15) }
  .sv  { font-family:var(--fd); font-size:36px; font-weight:400; color:var(--gray800); line-height:1 }
  .ss  { font-size:13px; color:var(--gray400) }
  .sbar   { height:6px; background:var(--gray200); border-radius:99px; overflow:hidden }
  .sbar-f { height:100%; background:var(--g500); border-radius:99px; transition:width .6s }
  .sc.acc .sbar   { background:rgba(255,255,255,.2) }
  .sc.acc .sbar-f { background:rgba(255,255,255,.8) }

  /* Grade inferior: refeições | gráfico | sugestões */
  .db { display:grid; grid-template-columns:1fr 1fr 380px; gap:20px }

  /* Item de refeição na lista */
  .mi { display:flex; align-items:center; gap:14px; padding:12px 14px;
        border-radius:var(--rs); background:var(--gray100); margin-bottom:7px;
        cursor:pointer; transition:background .15s }
  .mi:hover { background:var(--g50) }

  /* Item de sugestão de refeição */
  .si2 { display:flex; align-items:center; gap:14px; padding:12px 14px;
         border-radius:var(--rs); border:1.5px solid var(--gray200);
         cursor:pointer; transition:all .18s; margin-bottom:7px }
  .si2:hover { border-color:var(--g300); background:var(--g50) }
</style>
</head>
<body>
<div class="wrap">
  <!-- Sidebar é injetada aqui pelo api.js -->
  <div id="sidebar-root"></div>

  <main class="main">
    <div class="ph">
      <div>
        <!-- Saudação personalizada com nome do usuário -->
        <h2 id="greeting">Carregando...</h2>
        <p id="sub">Aguarde...</p>
      </div>
      <a href="pages/adicionar-refeicao.html" class="btn">+ Registrar Refeição</a>
    </div>

    <div class="ca">
      <!-- Cards de estatísticas do dia -->
      <div class="dg">

        <!-- Card principal: calorias (fundo verde escuro) -->
        <div class="sc acc">
          <div class="st">
            <span class="sl">Calorias Hoje</span>
            <div class="si">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                <path d="M12 2c0 6-8 8-8 14a8 8 0 0 0 16 0c0-6-8-8-8-14z"/>
              </svg>
            </div>
          </div>
          <div class="sv" id="s-kcal">—</div>
          <div class="ss" id="s-km">Meta: —</div>
          <div class="sbar"><div class="sbar-f" id="s-kb" style="width:0%"></div></div>
        </div>

        <!-- Card: proteínas -->
        <div class="sc">
          <div class="st">
            <span class="sl">Proteínas</span>
            <div class="si">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--g700)" stroke-width="2">
                <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/>
                <line x1="4" y1="22" x2="4" y2="15"/>
              </svg>
            </div>
          </div>
          <div class="sv"><span id="s-p">—</span><span style="font-size:18px;color:var(--gray400)">g</span></div>
          <div class="ss" id="s-pm">Meta: —</div>
          <div class="sbar"><div class="sbar-f" id="s-pb" style="width:0%;background:var(--g700)"></div></div>
        </div>

        <!-- Card: carboidratos -->
        <div class="sc">
          <div class="st">
            <span class="sl">Carboidratos</span>
            <div class="si">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--g700)" stroke-width="2">
                <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
              </svg>
            </div>
          </div>
          <div class="sv"><span id="s-c">—</span><span style="font-size:18px;color:var(--gray400)">g</span></div>
          <div class="ss" id="s-cm">Meta: —</div>
          <div class="sbar"><div class="sbar-f" id="s-cb" style="width:0%;background:var(--g500)"></div></div>
        </div>

        <!-- Card: gorduras -->
        <div class="sc">
          <div class="st">
            <span class="sl">Gorduras</span>
            <div class="si">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--g700)" stroke-width="2">
                <circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>
              </svg>
            </div>
          </div>
          <div class="sv"><span id="s-f">—</span><span style="font-size:18px;color:var(--gray400)">g</span></div>
          <div class="ss" id="s-fm">Meta: —</div>
          <div class="sbar"><div class="sbar-f" id="s-fb" style="width:0%;background:var(--g300)"></div></div>
        </div>
      </div>

      <!-- Grade inferior -->
      <div class="db">

        <!-- Lista de refeições do dia -->
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
            <div class="ct">Refeições de Hoje</div>
            <a href="pages/refeicoes.html" class="btn-o" style="padding:7px 14px;font-size:12px">Ver todas</a>
          </div>
          <!-- Preenchido dinamicamente pelo JavaScript -->
          <div id="meals-list">
            <div style="background:var(--gray200);border-radius:6px;height:16px;margin-bottom:10px"></div>
            <div style="background:var(--gray200);border-radius:6px;height:16px;margin-bottom:10px"></div>
          </div>
          <a href="pages/adicionar-refeicao.html"
             style="display:flex;align-items:center;gap:8px;padding:8px 0;
                    color:var(--g500);font-size:13px;font-weight:500;
                    text-decoration:none;margin-top:4px">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="16"/>
              <line x1="8" y1="12" x2="16" y2="12"/>
            </svg>
            Adicionar refeição
          </a>
        </div>

        <!-- Gráfico de rosca: distribuição de macros -->
        <div class="card" style="display:flex;flex-direction:column;align-items:center;gap:20px">
          <div class="ct" style="width:100%">Distribuição de Macros</div>
          <svg width="180" height="180" viewBox="0 0 180 180">
            <!-- Círculo de fundo (cinza) -->
            <circle cx="90" cy="90" r="70" fill="none" stroke="var(--gray200)" stroke-width="18"/>
            <!-- Arco de carboidratos (verde claro) -->
            <circle cx="90" cy="90" r="70" fill="none" stroke="var(--g300)" stroke-width="18"
                    id="rc" stroke-dasharray="0 440" stroke-linecap="round" transform="rotate(-90 90 90)"/>
            <!-- Arco de proteínas (verde escuro) -->
            <circle cx="90" cy="90" r="70" fill="none" stroke="var(--g700)" stroke-width="18"
                    id="rp" stroke-dasharray="0 440" stroke-linecap="round" transform="rotate(-90 90 90)"/>
            <!-- Texto central: total de kcal -->
            <text x="90" y="85" text-anchor="middle" font-family="Playfair Display,serif"
                  font-size="26" fill="var(--gray800)" id="rt">0</text>
            <text x="90" y="103" text-anchor="middle" font-family="DM Sans,sans-serif"
                  font-size="11" fill="var(--gray400)" letter-spacing="1">KCAL</text>
          </svg>
          <!-- Legenda do gráfico -->
          <div id="rleg" style="width:220px;display:flex;flex-direction:column;gap:10px"></div>
        </div>

        <!-- Sugestões de refeição baseadas no saldo calórico -->
        <div class="card">
          <div class="ct">Sugestões para Próxima Refeição</div>
          <p style="font-size:13px;color:var(--gray400);margin-bottom:12px">Com base no seu saldo calórico</p>
          <div id="sugs"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="js/api.js"></script>
<script>
  // Cores e labels para cada tipo de refeição
  const MC = {
    cafe:'#52b788', lanche_manha:'#95d5b2', almoco:'#2d6a4f',
    lanche_tarde:'#b7e4c7', jantar:'#1a3a2a', ceia:'#74c69d', outro:'#9aab9c'
  };
  const ML = {
    cafe:'☀️ Café', lanche_manha:'🌿 Lanche manhã', almoco:'🍽️ Almoço',
    lanche_tarde:'🍎 Lanche tarde', jantar:'🌙 Jantar', ceia:'🌛 Ceia', outro:'🍴 Outro'
  };

  // Carrega todos os dados do dashboard via API
  async function load() {
    const d = await GET('dashboard', { usuario_id: UID.get() });

    // Saudação personalizada com base no horário
    const hr = new Date().getHours();
    const greet = hr < 12 ? 'Bom dia' : hr < 18 ? 'Boa tarde' : 'Boa noite';
    document.getElementById('greeting').textContent = `${greet}, ${d.usuario.nome.split(' ')[0]} 👋`;
    const today = new Date().toLocaleDateString('pt-BR', { weekday:'long', day:'numeric', month:'long' });
    document.getElementById('sub').textContent =
      today.charAt(0).toUpperCase() + today.slice(1) +
      (d.streak_dias > 1 ? ` · 🔥 ${d.streak_dias} dias seguidos` : '');

    // Atualiza os 4 cards de estatísticas
    const meta = d.hoje.meta_kcal;
    const pm = Math.round(meta * .25 / 4);  // meta de proteínas em gramas
    const cm = Math.round(meta * .45 / 4);  // meta de carboidratos em gramas
    const fm = Math.round(meta * .30 / 9);  // meta de gorduras em gramas

    document.getElementById('s-kcal').textContent = Math.round(d.hoje.kcal).toLocaleString('pt-BR');
    document.getElementById('s-km').textContent   = `Meta: ${meta.toLocaleString('pt-BR')} kcal`;
    document.getElementById('s-kb').style.width   = Math.min(100, d.hoje.pct_meta) + '%';

    document.getElementById('s-p').textContent  = Math.round(d.hoje.proteina_g);
    document.getElementById('s-pm').textContent = `Meta: ${pm}g`;
    document.getElementById('s-pb').style.width = Math.min(100, Math.round(d.hoje.proteina_g / pm * 100)) + '%';

    document.getElementById('s-c').textContent  = Math.round(d.hoje.carb_g);
    document.getElementById('s-cm').textContent = `Meta: ${cm}g`;
    document.getElementById('s-cb').style.width = Math.min(100, Math.round(d.hoje.carb_g / cm * 100)) + '%';

    document.getElementById('s-f').textContent  = Math.round(d.hoje.gordura_g);
    document.getElementById('s-fm').textContent = `Meta: ${fm}g`;
    document.getElementById('s-fb').style.width = Math.min(100, Math.round(d.hoje.gordura_g / fm * 100)) + '%';

    // Lista de refeições do dia
    const ml = document.getElementById('meals-list');
    ml.innerHTML = d.refeicoes.length
      ? d.refeicoes.map(r => `
          <div class="mi" onclick="location.href='pages/refeicoes.html'">
            <div style="width:10px;height:10px;border-radius:50%;
                        background:${MC[r.tipo]||'#9aab9c'};flex-shrink:0"></div>
            <div style="flex:1">
              <div style="font-size:14px;font-weight:500">${ML[r.tipo] || r.tipo}</div>
              <div style="font-size:12px;color:var(--gray400);margin-top:2px">
                ${r.hora_ref?.slice(0,5) || ''} · ${r.num_itens} itens
              </div>
            </div>
            <div>
              <div style="font-size:15px;font-weight:600;color:var(--g700)">
                ${Math.round(r.kcal_total)}
              </div>
              <div style="font-size:11px;color:var(--gray400)">kcal</div>
            </div>
          </div>`).join('')
      : '<p style="font-size:13px;color:var(--gray400);padding:12px 0">Nenhuma refeição hoje. Que tal registrar a primeira?</p>';

    // Atualiza o gráfico de rosca SVG
    const kcal = Math.round(d.hoje.kcal);
    const tot  = d.hoje.proteina_g * 4 + d.hoje.carb_g * 4 + d.hoje.gordura_g * 9 || 1;
    const CIRC = 440;
    const pD   = Math.round(d.hoje.proteina_g * 4 / tot * CIRC);  // arco de proteínas
    const cD   = Math.round(d.hoje.carb_g * 4 / tot * CIRC);      // arco de carboidratos

    document.getElementById('rt').textContent = kcal.toLocaleString('pt-BR');
    document.getElementById('rp').setAttribute('stroke-dasharray', `${pD} ${CIRC}`);
    document.getElementById('rc').setAttribute('stroke-dasharray', `${cD} ${CIRC}`);
    document.getElementById('rc').setAttribute('stroke-dashoffset', `-${pD}`);

    // Legenda do gráfico
    document.getElementById('rleg').innerHTML = [
      ['var(--g700)', 'Proteínas',    `${Math.round(d.hoje.proteina_g)}g`],
      ['var(--g300)', 'Carboidratos', `${Math.round(d.hoje.carb_g)}g`],
      ['var(--g500)', 'Gorduras',     `${Math.round(d.hoje.gordura_g)}g`],
    ].map(([c, l, v]) => `
      <div style="display:flex;justify-content:space-between">
        <span style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--gray600)">
          <span style="width:8px;height:8px;border-radius:50%;background:${c};display:inline-block"></span>
          ${l}
        </span>
        <span style="font-size:13px;font-weight:600">${v}</span>
      </div>`).join('');

    // Sugestões de alimentos com base no saldo calórico
    document.getElementById('sugs').innerHTML = d.sugestoes.map(s => `
      <div class="si2" onclick="location.href='pages/alimentos.html'">
        <div style="font-size:22px">${s.emoji}</div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:500;color:var(--gray800)">${s.nome}</div>
          <div style="font-size:11px;color:var(--gray400);margin-top:2px">
            ${Math.round(s.proteina_g)}g prot · ${Math.round(s.carb_g)}g carb
          </div>
        </div>
        <div style="font-size:13px;font-weight:600;color:var(--g700)">
          ${Math.round(s.kcal)} kcal
        </div>
      </div>`).join('') || '<p style="font-size:13px;color:var(--gray400)">Sem sugestões agora.</p>';
  }

      // Inicializa sidebar e carrega dados
      scInit('dashboard').then(() => load().catch(e => toast(e.message, 'error')));
</script>
</body>
</html>
