<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<script>
  const _t = localStorage.getItem('sc_tema');
  if (_t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redefinir Senha — Sorriso Calories</title>
<link rel="stylesheet" href="css/shared.css">
<style>
  body { display:flex; align-items:center; justify-content:center;
         min-height:100vh; background:var(--gray100); width:100% }
  .auth-card { background:var(--white); border-radius:24px;
               box-shadow:0 8px 48px rgba(44,106,79,.13);
               padding:52px 56px; width:460px }
  .auth-logo { text-align:center; margin-bottom:32px }
  .auth-logo h1 { font-family:var(--fd); font-size:28px;
                  font-weight:500; color:var(--g700); line-height:1.2 }
  .auth-title { font-family:var(--fd); font-size:22px; font-weight:400;
                color:var(--gray800); margin-bottom:6px }
  .auth-sub   { font-size:14px; color:var(--gray400); margin-bottom:28px }
  .pw-wrap    { position:relative }
  .pw-wrap .inp { padding-right:44px }
  .pw-toggle  { position:absolute; right:14px; top:50%; transform:translateY(-50%);
                background:none; border:none; cursor:pointer;
                color:var(--gray400); padding:4px; transition:color .18s }
  .pw-toggle:hover { color:var(--g700) }
  .auth-err   { background:#fde8e8; color:#c0392b; border-radius:var(--rs);
                padding:12px 16px; font-size:13px; margin-bottom:16px; display:none }
  .auth-err.show { display:block }
  .auth-ok    { background:var(--g50); color:var(--g700); border-radius:var(--rs);
                padding:12px 16px; font-size:13px; margin-bottom:16px; display:none }
  .auth-ok.show { display:block }
</style>
</head>
<body>
<div class="auth-card">
  <div class="auth-logo">
    <div style="font-size:40px;margin-bottom:8px">🔑</div>
    <h1>Sorriso Calories</h1>
  </div>

  <h2 class="auth-title">Nova senha</h2>
  <p class="auth-sub">Digite sua nova senha abaixo</p>

  <div class="auth-err" id="err"></div>
  <div class="auth-ok"  id="ok"></div>

  <div id="form-area" style="display:flex;flex-direction:column;gap:16px">
    <div class="fg">
      <label class="lbl">Nova senha</label>
      <div class="pw-wrap">
        <input class="inp" id="senha" type="password"
               placeholder="Mínimo 8 caracteres" oninput="checkSenha()">
        <button class="pw-toggle" type="button" onclick="toggleSenha('senha', this)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <!-- Barra de força -->
      <div class="pw-strength" style="height:4px;border-radius:99px;
           background:var(--gray200);overflow:hidden;margin-top:6px">
        <div id="pw-bar" style="height:100%;border-radius:99px;
             width:0%;transition:width .3s,background .3s"></div>
      </div>
      <!-- Requisitos -->
      <div style="margin-top:8px;display:flex;flex-direction:column;gap:4px">
        <div style="font-size:12px;color:var(--gray400);transition:color .2s" id="req-len">  ✗ Mínimo 8 caracteres</div>
        <div style="font-size:12px;color:var(--gray400);transition:color .2s" id="req-upper">✗ Pelo menos 1 letra maiúscula</div>
        <div style="font-size:12px;color:var(--gray400);transition:color .2s" id="req-lower">✗ Pelo menos 1 letra minúscula</div>
        <div style="font-size:12px;color:var(--gray400);transition:color .2s" id="req-num">  ✗ Pelo menos 1 número</div>
        <div style="font-size:12px;color:var(--gray400);transition:color .2s" id="req-spec"> ✗ Pelo menos 1 caractere especial</div>
      </div>
    </div>
    <div class="fg">
      <label class="lbl">Confirmar nova senha</label>
      <div class="pw-wrap">
        <input class="inp" id="senha2" type="password" placeholder="Repita a senha">
        <button class="pw-toggle" type="button" onclick="toggleSenha('senha2', this)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>
    <button class="btn" id="btn"
            style="width:100%;justify-content:center;padding:14px;font-size:15px"
            onclick="redefinir()">
      Salvar nova senha
    </button>
  </div>
</div>

<script>
  const BASE = '/sorriso-calories/api';

  // Verifica se tem token na URL
  const params = new URLSearchParams(window.location.search);
  const token  = params.get('token');

  if (!token) {
    document.getElementById('form-area').style.display = 'none';
    const err = document.getElementById('err');
    err.textContent = 'Link inválido. Solicite um novo link de redefinição.';
    err.classList.add('show');
  }

  function toggleSenha(id, btn) {
    const input  = document.getElementById(id);
    const isPass = input.type === 'password';
    input.type   = isPass ? 'text' : 'password';
    btn.innerHTML = isPass
      ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
      : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
  }
    
    function checkSenha() {
      const s = document.getElementById('senha').value;
      const reqs = {
        'req-len':   s.length >= 8,
        'req-upper': /[A-Z]/.test(s),
        'req-lower': /[a-z]/.test(s),
        'req-num':   /[0-9]/.test(s),
        'req-spec':  /[^A-Za-z0-9]/.test(s),
      };
      const labels = {
        'req-len':   'Mínimo 8 caracteres',
        'req-upper': 'Pelo menos 1 letra maiúscula',
        'req-lower': 'Pelo menos 1 letra minúscula',
        'req-num':   'Pelo menos 1 número',
        'req-spec':  'Pelo menos 1 caractere especial',
      };
      for (const [id, passed] of Object.entries(reqs)) {
        const el = document.getElementById(id);
        el.textContent = (passed ? '✓ ' : '✗ ') + labels[id];
        el.style.color = passed ? 'var(--g700)' : 'var(--gray400)';
      }
      const ok  = Object.values(reqs).filter(Boolean).length;
      const bar = document.getElementById('pw-bar');
      const cores = ['', '#e05252', '#e8a838', '#52b788', '#2d6a4f'];
      if (s.length > 0) {
        bar.style.width      = (Math.max(1, ok) * 25) + '%';
        bar.style.background = cores[Math.max(1, Math.min(4, ok))];
      } else {
        bar.style.width = '0%';
      }
    }

  async function redefinir() {
    const senha  = document.getElementById('senha').value;
    const senha2 = document.getElementById('senha2').value;
    const err    = document.getElementById('err');
    const ok     = document.getElementById('ok');

    err.classList.remove('show');
    ok.classList.remove('show');

    if (senha.length < 8)             { err.textContent = 'A senha deve ter pelo menos 8 caracteres.';      err.classList.add('show'); return; }
    if (!/[A-Z]/.test(senha))         { err.textContent = 'A senha deve ter pelo menos 1 letra maiúscula.'; err.classList.add('show'); return; }
    if (!/[a-z]/.test(senha))         { err.textContent = 'A senha deve ter pelo menos 1 letra minúscula.'; err.classList.add('show'); return; }
    if (!/[0-9]/.test(senha))         { err.textContent = 'A senha deve ter pelo menos 1 número.';          err.classList.add('show'); return; }
    if (!/[^A-Za-z0-9]/.test(senha))  { err.textContent = 'A senha deve ter pelo menos 1 caractere especial.'; err.classList.add('show'); return; }
    if (senha !== senha2)             { err.textContent = 'As senhas não coincidem.';                        err.classList.add('show'); return; }

    const btn = document.getElementById('btn');
    btn.textContent = 'Salvando...';
    btn.disabled    = true;

    try {
      const res = await fetch(`${BASE}/auth/redefinir-senha`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ token, senha }),
      });
      const d = await res.json();

      if (res.ok) {
        ok.textContent = '✅ Senha redefinida! Redirecionando para o login...';
        ok.classList.add('show');
        document.getElementById('form-area').style.display = 'none';
        setTimeout(() => location.href = 'login.html', 2000);
      } else {
        err.textContent = d.error || 'Erro ao redefinir senha.';
        err.classList.add('show');
        btn.textContent = 'Salvar nova senha';
        btn.disabled    = false;
      }
    } catch(e) {
      err.textContent = 'Erro de conexão.';
      err.classList.add('show');
      btn.textContent = 'Salvar nova senha';
      btn.disabled    = false;
    }
  }
</script>
<!-- Botão de tema no canto superior direito -->
<button onclick="toggleTema()"
  style="position:fixed;top:20px;right:20px;background:var(--white);
         border:1.5px solid var(--gray200);border-radius:99px;
         padding:8px 16px;font-family:var(--fb);font-size:13px;
         color:var(--gray600);cursor:pointer;transition:all .18s;
         display:flex;align-items:center;gap:8px;box-shadow:var(--sh)"
  id="tema-btn">
  🌙 Tema escuro
</button>

<script>
  // Aplica o tema salvo ao carregar
  function aplicarTema() {
    const tema = localStorage.getItem('sc_tema') || 'light';
    if (tema === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
      document.getElementById('tema-btn').textContent = '☀️ Tema claro';
    } else {
      document.documentElement.removeAttribute('data-theme');
      document.getElementById('tema-btn').textContent = '🌙 Tema escuro';
    }
  }

  function toggleTema() {
    const atual = localStorage.getItem('sc_tema') || 'light';
    const novo  = atual === 'light' ? 'dark' : 'light';
    localStorage.setItem('sc_tema', novo);
    aplicarTema();
  }

  aplicarTema();
</script>
</body>
</html>
