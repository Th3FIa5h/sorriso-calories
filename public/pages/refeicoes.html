<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<script>
  const _t = localStorage.getItem('sc_tema');
  if (_t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refeições — Sorriso Calories</title>
<link rel="stylesheet" href="../css/shared.css">
<style>
  .ml  { display:grid; grid-template-columns:1fr 340px; gap:24px }
  .mc  { background:var(--white); border-radius:var(--r); box-shadow:var(--sh); overflow:hidden; margin-bottom:16px }
  .mch { padding:18px 24px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--gray200) }
  .mcb { padding:14px 24px 18px }
  .fr  { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--gray100) }
  .fr:last-child { border-bottom:none }
  .kb  { background:var(--g50); color:var(--g700); font-size:12px; font-weight:600; padding:4px 10px; border-radius:99px }
  .rb  { width:22px; height:22px; border-radius:50%; border:none; background:var(--gray200);
         color:var(--gray600); font-size:13px; cursor:pointer; display:flex; align-items:center;
         justify-content:center; transition:all .18s; margin-left:8px; flex-shrink:0 }
  .rb:hover { background:#fde8e8; color:#c0392b }
  .em  { border:2px dashed var(--gray200); box-shadow:none; background:transparent }
  .em .mch { border:none }
  .db2 { width:36px; height:36px; border-radius:50%; border:1.5px solid var(--gray200);
         background:var(--white); font-size:18px; cursor:pointer; display:flex;
         align-items:center; justify-content:center; transition:all .18s; color:var(--gray600) }
  .db2:hover { border-color:var(--g500); color:var(--g700) }
  /* Caixa de observações dentro do card de refeição */
  .obs-box { background:var(--g50); border-radius:var(--rs); padding:8px 12px;
             font-size:12px; color:var(--gray600); margin-top:10px;
             border-left:3px solid var(--g300); font-style:italic }
</style>
</head>
<body>
<div class="wrap">
  <div id="sidebar-root"></div>
  <main class="main">
    <div class="ph">
      <div><h2>Registro de Refeições</h2><p id="dlabel">—</p></div>
      <div style="display:flex;gap:10px;align-items:center">
        <button class="db2" onclick="changeDate(-1)">←</button>
        <input type="date" class="inp" id="dpicker" style="width:190px" onchange="loadDay()">
        <button class="db2" onclick="changeDate(1)">→</button>
        <a href="adicionar-refeicao.html" class="btn" style="margin-left:8px">+ Nova Refeição</a>
      </div>
    </div>
    <div class="ca">
      <div class="ml">
        <div id="mcol"><p style="text-align:center;padding:60px;color:var(--gray400)">Carregando...</p></div>
        <div style="display:flex;flex-direction:column;gap:20px">
          <div class="card">
            <div class="ct" style="margin-bottom:16px">Resumo do Dia</div>
            <div class="row"><span style="font-size:13px;color:var(--gray600)">Consumido</span><span style="font-size:14px;font-weight:600" id="sum-k">—</span></div>
            <div class="row"><span style="font-size:13px;color:var(--gray600)">Meta</span><span style="font-size:14px;font-weight:600" id="sum-m">—</span></div>
            <div class="row"><span style="font-size:13px;color:var(--gray600)">Saldo</span><span style="font-size:14px;font-weight:600" id="sum-s">—</span></div>
            <div class="row"><span style="font-size:13px;color:var(--gray600)">Refeições</span><span style="font-size:14px;font-weight:600" id="sum-r">—</span></div>
          </div>
          <div class="card">
            <div class="ct" style="margin-bottom:14px">Macronutrientes</div>
            <div class="mbs" id="mcol2"></div>
          </div>
          <a href="calculo.html" class="btn-o" style="justify-content:center">📊 Ver Cálculo</a>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="../js/api.js"></script>
<script>
  const MC = { cafe:'#52b788', almoco:'#2d6a4f', lanche_tarde:'#b7e4c7', jantar:'#1a3a2a', ceia:'#74c69d', outro:'#9aab9c' };
  const ML = { cafe:'☀️ Café da Manhã', almoco:'🍽️ Almoço', lanche_tarde:'🍎 Lanche da Tarde', jantar:'🌙 Jantar', ceia:'🌛 Ceia', outro:'🍴 Outro' };
  const MT = ['cafe','almoco','lanche_tarde','jantar'];

  let today = new Date().toISOString().split('T')[0];
  let meta  = 1800;

  function changeDate(d) {
    const dt = new Date(today + 'T12:00:00');
    dt.setDate(dt.getDate() + d);
    today = dt.toISOString().split('T')[0];
    document.getElementById('dpicker').value = today;
    loadDay();
  }

  async function loadDay() {
    today = document.getElementById('dpicker').value || today;
    const lbl = new Date(today + 'T12:00:00').toLocaleDateString('pt-BR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
    document.getElementById('dlabel').textContent = lbl.charAt(0).toUpperCase() + lbl.slice(1);

    const [day, user] = await Promise.all([
      GET('refeicoes', { usuario_id: UID.get(), data: today }),
      GET(`usuarios/${UID.get()}`)
    ]);
    meta = user.meta_kcal || 1800;

    const pm = Math.round(meta * .25 / 4);
    const cm = Math.round(meta * .45 / 4);
    const fm = Math.round(meta * .30 / 9);
    const k  = Math.round(day.totais.kcal || 0);
    const p  = Math.round(day.totais.prot || 0);
    const c  = Math.round(day.totais.carb || 0);
    const f  = Math.round(day.totais.fat  || 0);
    const saldo = meta - k;

    document.getElementById('sum-k').textContent = k.toLocaleString('pt-BR') + ' kcal';
    document.getElementById('sum-m').textContent = meta.toLocaleString('pt-BR') + ' kcal';
    document.getElementById('sum-s').textContent = (saldo >= 0 ? '−' : '+') + Math.abs(saldo).toLocaleString('pt-BR') + ' kcal';
    document.getElementById('sum-s').style.color = saldo >= 0 ? 'var(--g700)' : '#e07b39';
    document.getElementById('sum-r').textContent = day.refeicoes.length + ' registradas';

    document.getElementById('mcol2').innerHTML = [
      ['Proteínas',    p, pm, 'var(--g700)'],
      ['Carboidratos', c, cm, 'var(--g500)'],
      ['Gorduras',     f, fm, 'var(--g300)'],
    ].map(([l, v, m2, c2]) => `
      <div class="mr" style="margin-bottom:12px">
        <div class="mt">
          <span class="mn">${l}</span>
          <span class="mv">${v}g / ${m2}g</span>
        </div>
        <div class="mb">
          <div class="mf" style="width:${Math.min(100, m2 ? Math.round(v/m2*100) : 0)}%;background:${c2}"></div>
        </div>
      </div>`).join('');

    const col = document.getElementById('mcol');
    col.innerHTML = '';

    // Renderiza refeições registradas
    for (const r of day.refeicoes) col.innerHTML += buildCard(r);

    // Renderiza cards vazios para tipos ainda não registrados no dia
    const reg = day.refeicoes.map(r => r.tipo);
    for (const t of MT) {
      if (!reg.includes(t)) col.innerHTML += buildEmpty(t);
    }
  }

  function buildCard(r) {
    const itens = (r.itens || []).map(i => `
      <div class="fr">
        <div>
          <div style="font-size:14px;font-weight:500">${i.emoji || ''} ${i.nome}</div>
          <div style="font-size:12px;color:var(--gray400);margin-top:2px">${i.quantidade_g}g</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="kb">${Math.round(i.kcal)} kcal</span>
          <button class="rb" onclick="rmItem(${r.id},${i.id})">×</button>
        </div>
      </div>`).join('');

    // Exibe observações se existirem
    const obsHtml = r.obs
      ? `<div class="obs-box">💬 ${r.obs}</div>`
      : '';

    return `
      <div class="mc" id="mc-${r.id}">
        <div class="mch">
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:12px;height:12px;border-radius:50%;background:${MC[r.tipo]||'#9aab9c'}"></div>
            <h3 style="font-size:15px;font-weight:600">${ML[r.tipo] || r.tipo}</h3>
            ${r.hora_ref ? `<span style="font-size:12px;color:var(--gray400)">${r.hora_ref.slice(0,5)}</span>` : ''}
          </div>
          <div style="display:flex;align-items:center;gap:12px">
            <span style="font-size:14px;font-weight:600;color:var(--g700)">${Math.round(r.kcal_total)} kcal</span>
            <button class="btn-g" style="font-size:12px;padding:6px 12px;color:#c0392b"
                    onclick="rmRef(${r.id})">🗑 Excluir</button>
          </div>
        </div>
        <div class="mcb">
          ${itens || '<p style="font-size:13px;color:var(--gray400);padding:6px 0">Nenhum item.</p>'}
          ${obsHtml}
          <!-- Passa o ID da refeição existente para adicionar alimento sem criar nova -->
          <a href="adicionar-refeicao.html?ref_id=${r.id}&tipo=${r.tipo}"
             style="display:flex;align-items:center;gap:7px;padding:9px 0;
                    color:var(--g500);font-size:13px;font-weight:500;text-decoration:none;margin-top:4px">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="16"/>
              <line x1="8" y1="12" x2="16" y2="12"/>
            </svg>
            Adicionar alimento
          </a>
        </div>
      </div>`;
  }

  function buildEmpty(t) {
    return `
      <div class="mc em">
        <div class="mch">
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:12px;height:12px;border-radius:50%;background:var(--gray400)"></div>
            <h3 style="font-size:15px;font-weight:600;color:var(--gray400)">${ML[t]}</h3>
          </div>
          <a href="adicionar-refeicao.html?tipo=${t}" class="btn" style="font-size:13px;padding:10px 20px">+ Adicionar</a>
        </div>
      </div>`;
  }

  async function rmItem(refId, itemId) {
    if (!confirm('Remover?')) return;
    try { await DEL(`refeicoes/${refId}/itens/${itemId}`); toast('Removido ✅'); loadDay(); }
    catch(e) { toast(e.message, 'error'); }
  }

  async function rmRef(id) {
    if (!confirm('Excluir refeição?')) return;
    try { await DEL(`refeicoes/${id}`); toast('Excluída ✅'); loadDay(); }
    catch(e) { toast(e.message, 'error'); }
  }

  document.getElementById('dpicker').value = today;
  scInit('refeicoes').then(() => loadDay().catch(e => toast(e.message, 'error')));
</script>
</body>
</html>
